<!DOCTYPE html>
<html>
<head>
    <title>Formatting Tags</title>
</head>
<body>
    <h1 style="color: cornflowerblue;text-align: center;">HELLO CHAMPS!</h1>
    <hr>
    <b>Bold</b><br>
    <u>Underline</u><br>
    <i>italic</i><br>
    <em>Emphaized(italic)</em><br>
    <strong>Imp text(bold)</strong><br>
    <strike>999</strike><br>
    <mark>Hello</mark><br>
    <small>Hello</small><br>
    <!--Insert(ins)-->
    <p>Hello<ins>World</ins></p>
    <!--Delete-->
    <p>Hello <del>World</del></p>
    <!-- Super Script(Math) -->
    <p>a<sup>2</sup>+b<sup>2</sup></p>
    <p>H<sub>2</sub>O</p>

    <marquee behaviour="right" scrollamount="15" style="background-color:rgb(52, 185, 19);" >Breaking News</marquee>



</body>
</html>
