<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse:collapse;
        }
    </style>
</head>
<body>
    <table border="2" width="500" height="600">
        <caption>Table</caption>
        <tr>
            <td colspan="5">1</td>
        </tr>
        <tr>
            <td rowspan="4">2</td>
            <td>3</td>
            <td>4</td>
            <td rowspan="2">5</td>
            <td>6</td>
        </tr>
    </table>
</body>
</html>
